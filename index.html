<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Online EMDR & Bilateral Stimulation Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #12141e;
      --panel:     #1c1f2e;
      --accent:    #a8b8e8;
      --accent2:   #4a5580;
      --text:      #d0d8f0;
      --subtext:   #7880a8;
      --btn-start: #6aab88;
      --btn-stop:  #b87878;
      --canvas-bg: #1a1f35;
      --ball-l:    #d8a0b8;
      --ball-r:    #90b8d8;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    h1 {
      font-size: clamp(1.3rem, 3vw, 1.9rem);
      font-weight: 800;
      color: var(--accent);
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--subtext);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 24px;
    }

    .controls-top {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 32px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      color: #fff;
    }
    button:hover  { filter: brightness(1.08); }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

    #btnStart { background: var(--btn-start); }
    #btnStop  { background: var(--btn-stop); }

    /* ── Canvas ── */
    #canvas-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 7;
      background: var(--canvas-bg);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: 0 4px 24px rgba(100,120,180,0.13);
    }

    .ball {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      left: 50%;
      /* start hidden at center */
      transform: translate(-50%, -50%);
      opacity: 0;
      will-change: transform, opacity;
    }

    #leftBall {
      background: radial-gradient(circle at 35% 35%, #ffd6e0, var(--ball-l));
      box-shadow: 0 4px 20px rgba(240,140,160,0.4);
    }

    #rightBall {
      background: radial-gradient(circle at 35% 35%, #daeeff, var(--ball-r));
      box-shadow: 0 4px 20px rgba(140,180,240,0.4);
    }

    /* ── Settings ── */
    .settings {
      width: 100%;
      max-width: 900px;
      background: var(--panel);
      border-radius: 16px;
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 48px;
      box-shadow: 0 2px 12px rgba(100,120,180,0.08);
    }

    @media (max-width: 600px) {
      .settings { grid-template-columns: 1fr; }
    }

    .setting-row { display: flex; flex-direction: column; gap: 6px; }

    .setting-row label {
      color: var(--accent);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--accent2);
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    select {
      background: var(--bg);
      color: var(--text);
      border: 1.5px solid var(--accent2);
      border-radius: 7px;
      padding: 6px 10px;
      font-size: 0.92rem;
      cursor: pointer;
      width: 100%;
    }

    /* canvas color swatches */
    .swatch-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: border-color 0.15s;
    }
    .swatch.active { border-color: var(--accent); }

    /* timer */
    #timer {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      margin-top: 20px;
      letter-spacing: 3px;
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <h1>Free Online EMDR &amp; Bilateral Stimulation Tool</h1>
  <p class="subtitle">Customizable visual and auditory stimulation for anxiety relief and focus.</p>

  <div class="controls-top">
    <button id="btnStart">Start Session</button>
    <button id="btnStop" disabled>Stop</button>
  </div>

  <div id="canvas-wrap">
    <div class="ball" id="leftBall"></div>
    <div class="ball" id="rightBall"></div>
  </div>

  <div class="settings">

    <div class="setting-row">
      <label id="speedLabel">Speed (Rate): 1 Hz</label>
      <input type="range" id="speedSlider" min="0.2" max="4" step="0.1" value="1" />
    </div>

    <div class="setting-row">
      <label id="sharpLabel">Transition Sharpness: 8</label>
      <input type="range" id="sharpSlider" min="1" max="20" step="1" value="8" />
    </div>

    <div class="setting-row">
      <label>Canvas Color</label>
      <div class="swatch-group" id="bgSwatches">
        <div class="swatch active" data-color="#c5d5f0" style="background:#c5d5f0"></div>
        <div class="swatch" data-color="#c5e8d0" style="background:#c5e8d0"></div>
        <div class="swatch" data-color="#e8d0f0" style="background:#e8d0f0"></div>
        <div class="swatch" data-color="#f0e8c5" style="background:#f0e8c5"></div>
        <div class="swatch" data-color="#dde8f5" style="background:#dde8f5"></div>
      </div>
    </div>

    <div class="setting-row">
      <label id="dotSizeLabel">Dot Size: 70px</label>
      <input type="range" id="dotSizeSlider" min="20" max="140" step="5" value="70" />
    </div>

    <div class="setting-row">
      <label>Auditory Stimulation</label>
      <select id="audioSelect">
        <option value="none">None</option>
        <option value="tone">Tone (bilateral)</option>
        <option value="click">Click (bilateral)</option>
      </select>
    </div>

    <div class="setting-row">
      <label id="volLabel">Volume: 60%</label>
      <input type="range" id="volSlider" min="0" max="100" step="1" value="60" />
    </div>

  </div>

  <div id="timer">00:00</div>

<script>
// ── Constants (mirroring bilateralfocus.com) ────────────────────────────────
const ANIMATION = {
  CENTER_POSITION: 50,
  MOVEMENT_RANGE: 40,      // % of container width each ball travels from center
  MIN_GAIN_VALUE: 0.001,
  RESIZE_DEBOUNCE_MS: 100,
};
const AUDIO = {
  GAIN_RAMP_TIME: 0.05,
  STOP_DELAY_MS: 60,
  CROSSFADE: 0.05,
};

// ── State ───────────────────────────────────────────────────────────────────
const state = {
  running: false,
  animFrameId: null,
  startTime: 0,
  audioCtx: null,
  oscillator: null,
  leftGain: null,
  rightGain: null,
  audioEnabled: false,
  cleanupTimeoutId: null,
  timerIntervalId: null,
  sessionStart: null,
};

let cachedContainerWidth = 0;

// ── DOM ─────────────────────────────────────────────────────────────────────
const leftBall      = document.getElementById('leftBall');
const rightBall     = document.getElementById('rightBall');
const canvasWrap    = document.getElementById('canvas-wrap');
const btnStart      = document.getElementById('btnStart');
const btnStop       = document.getElementById('btnStop');
const speedSlider   = document.getElementById('speedSlider');
const speedLabel    = document.getElementById('speedLabel');
const sharpSlider   = document.getElementById('sharpSlider');
const sharpLabel    = document.getElementById('sharpLabel');
const dotSizeSlider = document.getElementById('dotSizeSlider');
const dotSizeLabel  = document.getElementById('dotSizeLabel');
const volSlider     = document.getElementById('volSlider');
const volLabel      = document.getElementById('volLabel');
const audioSelect   = document.getElementById('audioSelect');
const timerEl       = document.getElementById('timer');

// ── Helpers ─────────────────────────────────────────────────────────────────
function rate()      { return parseFloat(speedSlider.value); }
function sharpness() { return parseInt(sharpSlider.value, 10); }
function dotSize()   { return parseInt(dotSizeSlider.value, 10); }
function volume()    { return parseInt(volSlider.value, 10) / 100; }

function updateCachedWidth() {
  cachedContainerWidth = canvasWrap.clientWidth;
}

function applyDotSize() {
  const s = dotSize() + 'px';
  leftBall.style.width  = leftBall.style.height  = s;
  rightBall.style.width = rightBall.style.height = s;
}

function resetBalls() {
  leftBall.style.transform  = 'translate(-50%, -50%)';
  leftBall.style.opacity    = '0';
  rightBall.style.transform = 'translate(-50%, -50%)';
  rightBall.style.opacity   = '0';
}

// ── Animation loop (exact algorithm from bilateralfocus.com) ────────────────
function animateBalls() {
  if (!state.running) return;

  const elapsed = (performance.now() - state.startTime) / 1000;
  const r = rate();
  const sh = sharpness();

  const phase    = Math.PI * r * elapsed;
  const rawValue = Math.sin(phase);

  // tanh-based smooth transition — the "special effect"
  const leftValue  = 0.5 * (1 + Math.tanh(sh * rawValue));
  const rightValue = 1.0 - leftValue;

  // Position: each ball starts at center (left:50%) and moves outward
  const lOffset = -(ANIMATION.MOVEMENT_RANGE * leftValue)  * cachedContainerWidth / 100;
  const rOffset =  (ANIMATION.MOVEMENT_RANGE * rightValue) * cachedContainerWidth / 100;

  leftBall.style.transform  = `translate(calc(-50% + ${lOffset}px), -50%)`;
  leftBall.style.opacity    = leftValue;
  rightBall.style.transform = `translate(calc(-50% + ${rOffset}px), -50%)`;
  rightBall.style.opacity   = rightValue;

  // Audio
  if (state.audioEnabled && state.audioCtx?.state === 'running' && state.leftGain && state.rightGain) {
    const now = state.audioCtx.currentTime;
    state.leftGain.gain.setTargetAtTime(Math.max(ANIMATION.MIN_GAIN_VALUE, leftValue),  now, AUDIO.CROSSFADE);
    state.rightGain.gain.setTargetAtTime(Math.max(ANIMATION.MIN_GAIN_VALUE, rightValue), now, AUDIO.CROSSFADE);
  }

  state.animFrameId = requestAnimationFrame(animateBalls);
}

// ── Audio ───────────────────────────────────────────────────────────────────
function setupAudio() {
  const type = audioSelect.value;
  if (type === 'none') return;

  try {
    if (!state.audioCtx) {
      state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (state.audioCtx.state === 'suspended') state.audioCtx.resume();

    if (type === 'tone') {
      state.oscillator = state.audioCtx.createOscillator();
      state.oscillator.type = 'sine';
      state.oscillator.frequency.value = 300;
    } else {
      // click: noise buffer looped
      const buf = state.audioCtx.createBuffer(1, state.audioCtx.sampleRate * 0.04, state.audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
      state.oscillator = state.audioCtx.createBufferSource();
      state.oscillator.buffer = buf;
      state.oscillator.loop = true;
    }

    state.leftGain  = state.audioCtx.createGain();
    state.rightGain = state.audioCtx.createGain();
    state.leftGain.gain.value  = 0;
    state.rightGain.gain.value = 0;

    const masterGain = state.audioCtx.createGain();
    masterGain.gain.value = volume();

    const leftPanner  = state.audioCtx.createStereoPanner();
    const rightPanner = state.audioCtx.createStereoPanner();
    leftPanner.pan.value  = -1;
    rightPanner.pan.value =  1;

    state.oscillator.connect(state.leftGain);
    state.oscillator.connect(state.rightGain);
    state.leftGain.connect(leftPanner);
    state.rightGain.connect(rightPanner);
    leftPanner.connect(masterGain);
    rightPanner.connect(masterGain);
    masterGain.connect(state.audioCtx.destination);

    state.oscillator.start();
    state.audioEnabled = true;
  } catch(e) {
    console.error('Audio error:', e);
  }
}

function cleanupAudio() {
  if (state.cleanupTimeoutId) { clearTimeout(state.cleanupTimeoutId); state.cleanupTimeoutId = null; }
  if (!state.audioCtx || !state.oscillator) return;

  const now = state.audioCtx.currentTime;
  const osc = state.oscillator;
  if (state.leftGain && state.rightGain) {
    state.leftGain.gain.cancelScheduledValues(now);
    state.rightGain.gain.cancelScheduledValues(now);
    state.leftGain.gain.linearRampToValueAtTime(0, now + AUDIO.GAIN_RAMP_TIME);
    state.rightGain.gain.linearRampToValueAtTime(0, now + AUDIO.GAIN_RAMP_TIME);
  }
  state.cleanupTimeoutId = setTimeout(() => {
    try { osc.stop(); } catch(e) {}
    state.oscillator = null;
    state.cleanupTimeoutId = null;
  }, AUDIO.STOP_DELAY_MS);
  state.audioEnabled = false;
}

// ── Session ─────────────────────────────────────────────────────────────────
async function startSession() {
  if (state.running) return;
  state.running = true;
  btnStart.disabled = true;
  btnStop.disabled  = false;

  updateCachedWidth();
  state.startTime   = performance.now();
  state.sessionStart = Date.now();
  state.timerIntervalId = setInterval(() => {
    const s = Math.floor((Date.now() - state.sessionStart) / 1000);
    timerEl.textContent = String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }, 1000);

  setupAudio();
  animateBalls();
}

function stopSession() {
  if (!state.running) return;
  state.running = false;
  btnStart.disabled = false;
  btnStop.disabled  = true;
  cancelAnimationFrame(state.animFrameId);
  clearInterval(state.timerIntervalId);
  cleanupAudio();
  resetBalls();
}

btnStart.addEventListener('click', startSession);
btnStop.addEventListener('click',  stopSession);

// ── Controls ─────────────────────────────────────────────────────────────────
speedSlider.addEventListener('input', () => {
  speedLabel.textContent = `Speed (Rate): ${parseFloat(speedSlider.value).toFixed(1)} Hz`;
});

sharpSlider.addEventListener('input', () => {
  sharpLabel.textContent = `Transition Sharpness: ${sharpSlider.value}`;
});

dotSizeSlider.addEventListener('input', () => {
  dotSizeLabel.textContent = `Dot Size: ${dotSize()}px`;
  applyDotSize();
});

volSlider.addEventListener('input', () => {
  volLabel.textContent = `Volume: ${volSlider.value}%`;
});

document.getElementById('bgSwatches').addEventListener('click', e => {
  const sw = e.target.closest('.swatch');
  if (!sw) return;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  sw.classList.add('active');
  canvasWrap.style.background = sw.dataset.color;
});

// resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(updateCachedWidth, ANIMATION.RESIZE_DEBOUNCE_MS);
});

// visibility
document.addEventListener('visibilitychange', () => {
  if (!state.audioCtx) return;
  if (document.hidden) { state.audioCtx.suspend(); }
  else if (state.running) { state.audioCtx.resume(); }
});

// ── Init ─────────────────────────────────────────────────────────────────────
applyDotSize();
updateCachedWidth();
</script>
</body>
</html>
