<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Online EMDR & Bilateral Stimulation Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1123;
      color: #ffd700;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
    }

    h1 {
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 800;
      color: #ffd700;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #ff8c00;
      font-size: 1rem;
      text-align: center;
      margin-bottom: 24px;
    }

    .controls-top {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.96); }

    #btnStart { background: #2d7a2d; color: #fff; }
    #btnStop  { background: #b22222; color: #fff; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── Canvas area ── */
    #canvas-wrap {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16 / 7;
      background: linear-gradient(135deg, #ff8c00 0%, #ff4500 100%);
      border-radius: 18px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .dot {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      transition: opacity 0.08s;
      /* subtle inner shadow for depth */
      box-shadow: inset 0 4px 12px rgba(255,255,255,0.25), 0 4px 16px rgba(0,0,0,0.4);
    }

    #dotLeft  { background: radial-gradient(circle at 35% 35%, #d4c4a8, #8b7355); left: 10%; }
    #dotRight { background: radial-gradient(circle at 35% 35%, #d4c4a8, #8b7355); right: 10%; }

    /* moving-ball mode */
    #dotBall {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: radial-gradient(circle at 35% 35%, #ffffff, #c8a87a);
      box-shadow: inset 0 4px 12px rgba(255,255,255,0.4), 0 6px 20px rgba(0,0,0,0.5);
      display: none;
      left: 10%;
    }

    /* ── Settings panel ── */
    .settings {
      width: 100%;
      max-width: 900px;
      background: #1a1d35;
      border-radius: 14px;
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px 40px;
    }

    @media (max-width: 600px) {
      .settings { grid-template-columns: 1fr; }
    }

    .setting-row { display: flex; flex-direction: column; gap: 6px; }

    .setting-row label {
      color: #ffd700;
      font-size: 0.9rem;
      font-weight: 600;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #ff8c00;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: #ffd700;
      cursor: pointer;
      box-shadow: 0 0 4px rgba(0,0,0,0.4);
    }

    select {
      background: #0f1123;
      color: #ffd700;
      border: 1px solid #ff8c00;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.95rem;
      cursor: pointer;
      width: 100%;
    }

    /* color swatches */
    .swatch-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .swatch {
      width: 30px; height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }
    .swatch.active { border-color: #ffd700; }

    .dot-size-wrap { display: flex; align-items: center; gap: 10px; }
    .dot-preview {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #d4c4a8, #8b7355);
      flex-shrink: 0;
      transition: width 0.15s, height 0.15s;
    }

    /* session timer */
    #timer {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ff8c00;
      text-align: center;
      margin-top: 20px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <h1>Free Online EMDR &amp; Bilateral Stimulation Tool</h1>
  <p class="subtitle">Customizable visual and auditory stimulation for anxiety relief and focus.</p>

  <div class="controls-top">
    <button id="btnStart">Start Session</button>
    <button id="btnStop" disabled>Stop</button>
  </div>

  <div id="canvas-wrap">
    <div class="dot" id="dotLeft"></div>
    <div class="dot" id="dotRight" style="opacity:0.3"></div>
    <div id="dotBall"></div>
  </div>

  <div class="settings">

    <!-- Speed -->
    <div class="setting-row">
      <label id="speedLabel">Alternation Rate (Speed): 1 Hz</label>
      <input type="range" id="speedSlider" min="0.2" max="4" step="0.1" value="1" />
    </div>

    <!-- Mode -->
    <div class="setting-row">
      <label>Stimulation Mode</label>
      <select id="modeSelect">
        <option value="alternate">Alternate Flash</option>
        <option value="move">Moving Ball</option>
      </select>
    </div>

    <!-- Background color -->
    <div class="setting-row">
      <label>Canvas Color</label>
      <div class="swatch-group" id="bgSwatches">
        <div class="swatch active" data-color="linear-gradient(135deg,#ff8c00,#ff4500)" style="background:linear-gradient(135deg,#ff8c00,#ff4500)"></div>
        <div class="swatch" data-color="linear-gradient(135deg,#1e3a5f,#0d2137)" style="background:linear-gradient(135deg,#1e3a5f,#0d2137)"></div>
        <div class="swatch" data-color="linear-gradient(135deg,#1a472a,#0d2615)" style="background:linear-gradient(135deg,#1a472a,#0d2615)"></div>
        <div class="swatch" data-color="linear-gradient(135deg,#2d0a4e,#150727)" style="background:linear-gradient(135deg,#2d0a4e,#150727)"></div>
        <div class="swatch" data-color="#1a1d35" style="background:#1a1d35"></div>
      </div>
    </div>

    <!-- Dot size -->
    <div class="setting-row">
      <label id="dotSizeLabel">Dot Size: 70px</label>
      <div class="dot-size-wrap">
        <input type="range" id="dotSizeSlider" min="20" max="140" step="5" value="70" />
        <div class="dot-preview" id="dotPreview" style="width:35px;height:35px"></div>
      </div>
    </div>

    <!-- Audio -->
    <div class="setting-row">
      <label>Auditory Stimulation</label>
      <select id="audioSelect">
        <option value="none">None</option>
        <option value="click">Click (bilateral)</option>
        <option value="tone">Tone (bilateral)</option>
      </select>
    </div>

    <!-- Volume -->
    <div class="setting-row">
      <label id="volLabel">Volume: 60%</label>
      <input type="range" id="volSlider" min="0" max="100" step="1" value="60" />
    </div>

  </div>

  <div id="timer">00:00</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────────
  let running = false;
  let intervalId = null;
  let phase = 0; // 0 = left active, 1 = right active
  let ballDir = 1;
  let ballPos = 0.1; // fraction of canvas width (left edge of dot)
  let ballAnimId = null;
  let sessionStart = null;
  let timerIntervalId = null;
  let audioCtx = null;

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const btnStart      = document.getElementById('btnStart');
  const btnStop       = document.getElementById('btnStop');
  const dotLeft       = document.getElementById('dotLeft');
  const dotRight      = document.getElementById('dotRight');
  const dotBall       = document.getElementById('dotBall');
  const canvasWrap    = document.getElementById('canvas-wrap');
  const speedSlider   = document.getElementById('speedSlider');
  const speedLabel    = document.getElementById('speedLabel');
  const modeSelect    = document.getElementById('modeSelect');
  const dotSizeSlider = document.getElementById('dotSizeSlider');
  const dotSizeLabel  = document.getElementById('dotSizeLabel');
  const dotPreview    = document.getElementById('dotPreview');
  const volSlider     = document.getElementById('volSlider');
  const volLabel      = document.getElementById('volLabel');
  const audioSelect   = document.getElementById('audioSelect');
  const timerEl       = document.getElementById('timer');

  // ─── Helpers ────────────────────────────────────────────────────────────────
  function hz() { return parseFloat(speedSlider.value); }
  function intervalMs() { return 1000 / hz(); }
  function dotSize() { return parseInt(dotSizeSlider.value); }
  function mode() { return modeSelect.value; }
  function volume() { return parseInt(volSlider.value) / 100; }

  function applyDotSize() {
    const s = dotSize() + 'px';
    dotLeft.style.width  = dotLeft.style.height  = s;
    dotRight.style.width = dotRight.style.height = s;
    dotBall.style.width  = dotBall.style.height  = s;
    // center vertically
    const half = dotSize() / 2;
    dotLeft.style.marginTop  = `-${half}px`;
    dotRight.style.marginTop = `-${half}px`;
    dotBall.style.marginTop  = `-${half}px`;
    // preview (half size)
    const ps = dotSize() / 2;
    dotPreview.style.width = dotPreview.style.height = ps + 'px';
  }

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playSound(side) {
    const type = audioSelect.value;
    if (type === 'none') return;
    try {
      const ctx = getAudioCtx();
      const gain = ctx.createGain();
      gain.gain.value = volume();
      const panner = ctx.createStereoPanner();
      panner.pan.value = side === 'left' ? -1 : 1;
      gain.connect(panner);
      panner.connect(ctx.destination);

      if (type === 'click') {
        const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(gain);
        src.start();
      } else {
        const osc = ctx.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = side === 'left' ? 440 : 528;
        osc.connect(gain);
        osc.start();
        osc.stop(ctx.currentTime + 0.08);
      }
    } catch(e) {}
  }

  // ─── Alternate flash mode ────────────────────────────────────────────────────
  function tick() {
    phase = 1 - phase;
    if (phase === 0) {
      dotLeft.style.opacity  = '1';
      dotRight.style.opacity = '0.25';
      playSound('left');
    } else {
      dotLeft.style.opacity  = '0.25';
      dotRight.style.opacity = '1';
      playSound('right');
    }
  }

  // ─── Moving ball mode ────────────────────────────────────────────────────────
  function startBallAnim() {
    dotLeft.style.display  = 'none';
    dotRight.style.display = 'none';
    dotBall.style.display  = 'block';

    const wrapW  = canvasWrap.offsetWidth;
    const sz     = dotSize();
    const minPx  = 0.05 * wrapW;
    const maxPx  = wrapW - sz - 0.05 * wrapW;
    const totalDist = maxPx - minPx;
    // pixels per second = totalDist / (0.5 / hz) = totalDist * hz * 2
    const speed = totalDist * hz() * 2;
    let lastTime = null;
    let curPx = minPx;

    function frame(ts) {
      if (!running) return;
      if (!lastTime) lastTime = ts;
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;
      curPx += ballDir * speed * dt;
      if (curPx >= maxPx) { curPx = maxPx; ballDir = -1; playSound('right'); }
      if (curPx <= minPx) { curPx = minPx; ballDir =  1; playSound('left'); }
      dotBall.style.left = curPx + 'px';
      ballAnimId = requestAnimationFrame(frame);
    }
    ballAnimId = requestAnimationFrame(frame);
  }

  function stopBallAnim() {
    if (ballAnimId) { cancelAnimationFrame(ballAnimId); ballAnimId = null; }
    dotBall.style.display  = 'none';
    dotLeft.style.display  = 'block';
    dotRight.style.display = 'block';
  }

  // ─── Session timer ───────────────────────────────────────────────────────────
  function updateTimer() {
    const secs = Math.floor((Date.now() - sessionStart) / 1000);
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    timerEl.textContent = m + ':' + s;
  }

  // ─── Start / Stop ────────────────────────────────────────────────────────────
  function startSession() {
    running = true;
    btnStart.disabled = true;
    btnStop.disabled  = false;
    sessionStart = Date.now();
    timerIntervalId = setInterval(updateTimer, 1000);

    if (mode() === 'alternate') {
      dotLeft.style.opacity  = '1';
      dotRight.style.opacity = '0.25';
      phase = 0;
      intervalId = setInterval(tick, intervalMs());
    } else {
      startBallAnim();
    }
  }

  function stopSession() {
    running = false;
    btnStart.disabled = false;
    btnStop.disabled  = true;
    clearInterval(intervalId);
    clearInterval(timerIntervalId);
    stopBallAnim();
    dotLeft.style.opacity  = '1';
    dotRight.style.opacity = '0.25';
  }

  btnStart.addEventListener('click', startSession);
  btnStop.addEventListener('click',  stopSession);

  // ─── Controls ────────────────────────────────────────────────────────────────
  speedSlider.addEventListener('input', () => {
    speedLabel.textContent = `Alternation Rate (Speed): ${parseFloat(speedSlider.value).toFixed(1)} Hz`;
    if (!running) return;
    if (mode() === 'alternate') {
      clearInterval(intervalId);
      intervalId = setInterval(tick, intervalMs());
    }
    // ball mode self-adjusts via closure variable read each frame
  });

  dotSizeSlider.addEventListener('input', () => {
    dotSizeLabel.textContent = `Dot Size: ${dotSize()}px`;
    applyDotSize();
  });

  volSlider.addEventListener('input', () => {
    volLabel.textContent = `Volume: ${volSlider.value}%`;
  });

  modeSelect.addEventListener('change', () => {
    if (!running) return;
    stopSession();
    startSession();
  });

  // ─── Background swatches ─────────────────────────────────────────────────────
  document.getElementById('bgSwatches').addEventListener('click', e => {
    const sw = e.target.closest('.swatch');
    if (!sw) return;
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    canvasWrap.style.background = sw.dataset.color;
  });

  // ─── Init ────────────────────────────────────────────────────────────────────
  applyDotSize();
</script>
</body>
</html>
